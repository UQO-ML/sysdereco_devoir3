name: Auto Assign pull-request
on:
  pull_request:
    types: [opened]
jobs:
  pull-request-auto-assign:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: "Auto-assign pull request"
        uses: pozil/auto-assign-issue@39c06395cbac76e79afc4ad4e5c5c6db6ecfdd2e # v2.2.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          assignees: T4rg3n, kiloutyg, Skodelowski, DongMeiTime
          numOfAssignee: 2
          abortIfPreviousAssignees: false
          allowSelfAssign: true
