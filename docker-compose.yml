version: "3.9"

services:
  fuseki:
    image: stain/jena-fuseki:4.10.0
    container_name: inf6083_fuseki
    ports:
      - "3030:3030"
    environment:
      ADMIN_PASSWORD: admin123
      FUSEKI_DATASET_1: /recommendations
    volumes:
      - fuseki_data:/fuseki
      - ./docker/fuseki:/fuseki/configuration:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3030/$/ping"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  fuseki_data:
    name: inf6083_fuseki_data
